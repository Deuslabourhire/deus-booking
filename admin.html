<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Deus Labour Hire</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111111;
  --dark:#1c1c1c;
  --green:#22b022;
  --green-dark:#1a8a1a;
  --orange-light:#fdf3e0;
  --bg:#f5f5f5;
  --white:#ffffff;
  --text:#111111;
  --text-mid:#555555;
  --text-light:#999999;
  --border:#e0e0e0;
  --success:#1a7a4a;
  --success-bg:#edf7f1;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --danger:#c0392b;
  --danger-bg:#fef2f2;
  --info-bg:#eff6ff;
  --info:#1d4ed8;
  --shadow:0 2px 10px rgba(0,0,0,0.07);
  --shadow-card:0 4px 22px rgba(0,0,0,0.10);
}
body{background:var(--bg);color:var(--text);font-family:'Montserrat',system-ui,sans-serif;min-height:100vh}

.header{background:var(--black);position:sticky;top:0;z-index:200}
.header-inner{max-width:960px;margin:0 auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:12px}
.logo-img{height:36px;width:auto}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.09em;text-transform:uppercase;margin-top:2px}
.hdr-btns{display:flex;gap:8px}
.btn{padding:9px 16px;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.02em}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}
.btn-outline:hover{border-color:rgba(255,255,255,0.5);color:#fff}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:90vh;padding:20px}
.login-card{background:var(--white);border-radius:18px;box-shadow:var(--shadow-card);padding:36px 30px;width:100%;max-width:380px;text-align:center}
.login-logo{height:56px;margin:0 auto 18px;display:block}
.login-card h2{font-size:20px;font-weight:800;color:var(--black);margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text-mid);margin-bottom:22px}
.login-card input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:12px;transition:border .2s}
.login-card input:focus{border-color:var(--black)}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;background:var(--black);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-login:hover{background:var(--dark)}
.login-err{font-size:12px;color:var(--danger);margin-top:10px;display:none;font-weight:500}

#app{display:none;max-width:960px;margin:0 auto;padding:0 16px 60px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px 0 14px}
.stat{background:var(--white);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow);border:1.5px solid var(--border)}
.stat-val{font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;margin-top:5px;font-weight:700}

.tabs{display:flex;gap:4px;background:var(--white);border-radius:11px;padding:5px;box-shadow:var(--shadow);margin-bottom:14px;border:1.5px solid var(--border)}
.tab{flex:1;background:transparent;border:none;color:var(--text-light);border-radius:7px;padding:9px 4px;font-size:11px;cursor:pointer;font-family:inherit;text-align:center;font-weight:600;transition:all .2s}
.tab.active{background:var(--black);color:#fff}

.search{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;font-family:inherit;margin-bottom:13px;transition:border .2s}
.search:focus{border-color:var(--black)}

.card{background:var(--white);border:1.5px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:9px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-card)}
.card-header{padding:14px 15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--black);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.card-name{font-size:14px;color:var(--text);font-weight:700;margin-left:11px}
.card-meta{font-size:11px;color:var(--text-mid);margin-top:2px;margin-left:11px}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.card-body{border-top:1.5px solid var(--border);padding:14px 15px;display:none;background:rgba(245,245,245,0.5)}
.card-body.open{display:block}

.info-box{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:12px 13px;margin-bottom:9px}
.info-title{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:700}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:5px}
.info-key{font-size:11px;color:var(--text-mid);flex-shrink:0}
.info-val{font-size:12px;color:var(--text);text-align:right;word-break:break-all;font-weight:600}

.action-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.action-btn{padding:7px 12px;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;transition:filter .2s}
.action-btn:hover{filter:brightness(0.92)}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav h3{font-size:18px;font-weight:800;color:var(--black)}
.cal-nav-btn{background:var(--white);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:7px 13px;cursor:pointer;font-size:16px;transition:all .2s}
.cal-nav-btn:hover{background:var(--black);color:#fff;border-color:var(--black)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:10px;color:var(--text-light);padding:4px 0;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.cal-cell{min-height:56px;border-radius:7px;padding:5px;background:var(--white);border:1.5px solid transparent}
.cal-cell.today{border-color:var(--green);background:var(--green-light)}
.cal-cell.empty{background:transparent}
.cal-num{font-size:11px;text-align:right;color:var(--text-light);font-weight:600}
.cal-cell.today .cal-num{color:var(--green-dark);font-weight:800}
.cal-event{font-size:9px;border-radius:4px;padding:2px 4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.cal-jobs{margin-top:16px;border-top:1.5px solid var(--border);padding-top:13px}
.cal-job-row{padding:10px 0;border-bottom:1px solid var(--border)}
.cal-job-row:last-child{border-bottom:none}

.doc-tab-btns{display:flex;gap:6px;margin-bottom:13px}
.doc-tab-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:1.5px solid var(--border);background:var(--white);color:var(--text-mid)}
.doc-tab-btn.active{background:var(--black);color:#fff;border-color:var(--black)}
.doc-view{background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:18px;font-size:12px;color:var(--text-mid);line-height:1.8;white-space:pre-wrap;max-height:500px;overflow-y:auto;font-family:inherit}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,17,17,0.65);z-index:500;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.modal h3{font-size:18px;font-weight:800;color:var(--black);margin-bottom:18px}
.field{margin-bottom:13px}
.field label{font-size:10px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--black)}
.field textarea{resize:vertical;min-height:58px}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-btns .btn-cancel{flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--border);color:var(--text-mid);font-weight:700;border-radius:9px}
.modal-btns .btn-save{flex:2;padding:12px;background:var(--black);color:#fff;font-weight:700;border-radius:9px;border:none;cursor:pointer;font-family:inherit}
.modal-btns .btn-save:hover{background:var(--dark)}

.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;border-radius:10px;padding:10px 20px;z-index:2000;font-size:13px;font-weight:600;box-shadow:var(--shadow-card);display:none;white-space:nowrap;border:1px solid rgba(232,160,32,0.4)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-inner">
    <div class="brand">
      <img src="https://deuslabourhire.au/wp-content/uploads/2025/11/log-Deus2.jpg" alt="Deus Labour Hire" class="logo-img" onerror="this.outerHTML='<div style=\'font-size:15px;color:#fff;font-weight:800\'>Deus Labour Hire</div>'"/>
      <div class="brand-sub">Admin Panel</div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Job</button>
      <button class="btn btn-outline" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div id="loginScreen">
  <div class="login-card">
    <img src="https://deuslabourhire.au/wp-content/uploads/2025/11/log-Deus2.jpg" alt="Deus Labour Hire" class="login-logo" onerror="this.style.display='none'"/>
    <h2>Admin Login</h2>
    <p>Enter the password to access the panel</p>
    <input type="password" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-login" onclick="login()">Login →</button>
    <div class="login-err" id="loginErr">Incorrect password. Please try again.</div>
  </div>
</div>

<div id="app">
  <div class="stats">
    <div class="stat"><div class="stat-val" style="color:var(--info)" id="statUpcoming">0</div><div class="stat-lbl" style="color:var(--info)">Upcoming</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--success)" id="statDone">0</div><div class="stat-lbl" style="color:var(--success)">Completed</div></div>
    <div class="stat" id="statRemBox"><div class="stat-val" id="statRem" style="color:var(--text-light)">0</div><div class="stat-lbl" id="statRemLbl" style="color:var(--text-light)">Reminders</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('Calendar',this)">📅 Calendar</button>
    <button class="tab" onclick="switchTab('Clients',this)">👥 Clients</button>
    <button class="tab" onclick="switchTab('Docs',this)">📄 Docs</button>
    <button class="tab" onclick="switchTab('Calc',this)">🧮 Calc</button>
  </div>

  <div id="tabCalendar">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <h3 id="calTitle"></h3>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid" id="calDayLabels"></div>
    <div class="cal-grid" id="calCells" style="margin-top:3px"></div>
    <div class="cal-jobs" id="calJobs"></div>
  </div>

  <div id="tabClients" style="display:none">
    <input class="search" id="searchInput" placeholder="Search by name, email or phone..." oninput="renderClients()"/>
    <div id="clientList"></div>
  </div>

  <div id="tabDocs" style="display:none">
    <div class="doc-tab-btns">
      <button class="doc-tab-btn active" id="docTabTC" onclick="switchDoc('tc')">Terms &amp; Conditions</button>
      <button class="doc-tab-btn" id="docTabSA" onclick="switchDoc('sa')">Service Agreement</button>
    </div>
    <div class="doc-view" id="docContent"></div>
  </div>
</div>

  <div id="tabCalc" style="display:none">
    <div style="font-size:16px;font-weight:700;margin-bottom:14px;color:#e8f0e8">🧮 Job Calculator</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field" style="margin-bottom:0"><label>Start Time</label><input type="time" id="cStart" style="padding:8px 10px;font-size:13px"/></div>
      <div class="field" style="margin-bottom:0"><label>Finish Time</label><input type="time" id="cFinish" style="padding:8px 10px;font-size:13px"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field" style="margin-bottom:0"><label>Rate/hr ($)</label><input type="number" id="cRate" value="150" min="0" style="padding:8px 10px;font-size:13px"/></div>
      <div class="field" style="margin-bottom:0"><label>Call Out ($)</label><input type="number" id="cCallout" value="0" min="0" style="padding:8px 10px;font-size:13px"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="field" style="margin-bottom:0"><label>Additional ($)</label><input type="number" id="cExtras" value="0" min="0" style="padding:8px 10px;font-size:13px"/></div>
      <div class="field" style="margin-bottom:0"><label>Client Name</label><input type="text" id="cClientName" placeholder="Optional" style="padding:8px 10px;font-size:13px"/></div>
    </div>
    <div style="background:#0e1218;border:1px solid #1c2130;border-radius:8px;padding:10px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;font-weight:500">Include GST (10%) <span id="cGSTBadge" style="font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;background:#3a1a1a;color:#fca5a5;margin-left:5px">OFF</span></div>
      <input type="checkbox" id="cGST" onchange="updateCalcGST()" style="width:18px;height:18px;accent-color:#3d8b3d;cursor:pointer"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="calcJob()" style="padding:11px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#3d8b3d,#2a6b2a);color:#fff">Calculate →</button>
      <button onclick="resetCalc()" style="padding:11px;border:1px solid #1c2130;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;background:#0e1218;color:#6b7a6b">Reset</button>
    </div>
    <div id="calcResult" style="display:none;background:#0e1218;border:1px solid #3d8b3d;border-radius:12px;padding:14px;margin-top:14px">
      <div style="font-size:10px;color:#3d8b3d;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px">Result</div>
      <div id="calcDuration" style="background:#1a3a1a;color:#86efac;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block;margin-bottom:10px"></div>
      <div id="calcRows"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 3px;border-top:1px solid #2a3a2a;margin-top:6px">
        <span style="font-size:13px;font-weight:700;color:#e8f0e8">TOTAL</span>
        <span id="calcTotal" style="font-size:22px;color:#6ec86e;font-weight:700"></span>
      </div>
      <div id="calcGSTNote" style="font-size:10px;color:#6b7a6b;text-align:right;margin-top:3px"></div>
      <div style="background:#121720;border:1px solid #1c2130;border-radius:8px;padding:11px;margin-top:11px">
        <div style="font-size:10px;color:#6b7a6b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600">WhatsApp Message</div>
        <div id="calcMsg" style="font-size:11px;line-height:1.7;white-space:pre-wrap;color:#e8f0e8"></div>
        <button onclick="copyCalcMsg()" style="width:100%;background:#1e3a1e;color:#86efac;border:none;border-radius:7px;padding:7px;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;margin-top:8px">📋 Copy Message</button>
      </div>
    </div>
  </div>


<!-- Day Jobs Modal -->
<div id="dayModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)" onclick="if(event.target===this)closeDayModal()">
  <div style="background:#0e1218;border:1px solid #1c2130;border-radius:16px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.7)">
    <div style="padding:18px 18px 0;display:flex;justify-content:space-between;align-items:center">
      <div id="dayModalTitle" style="font-family:var(--font-serif,serif);font-size:18px;font-weight:700"></div>
      <button onclick="closeDayModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7a6b;line-height:1">×</button>
    </div>
    <div id="dayModalContent" style="padding:14px 18px 20px"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add New Job</h3>
    <input type="hidden" id="editId"/>
    <div class="field"><label>Full Name *</label><input id="mName" placeholder="Jane Smith"/></div>
    <div class="field"><label>Phone *</label><input id="mPhone" placeholder="04xx xxx xxx"/></div>
    <div class="field"><label>Email *</label><input id="mEmail" type="email" placeholder="jane@example.com"/></div>
    <div class="modal-row">
      <div class="field"><label>Date *</label><input id="mDate" type="date"/></div>
      <div class="field"><label>Start Time *</label><input id="mTime" type="time"/></div>
    </div>
    <div class="field"><label>Pick-up Address *</label><input id="mPickup"/></div>
    <div class="field"><label>Drop-off Address *</label><input id="mDropoff"/></div>
    <div class="field"><label>Notes</label><textarea id="mNotes"></textarea></div>
    <div class="field"><label>Status</label>
      <select id="mStatus">
        <option value="upcoming">Upcoming</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveJob()">Save Job</button>
    </div>
  </div>
</div>

async function hashPassword(p){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}

async function login(){
  const pw=$('passInput').value;
  const h=await hashPassword(pw);
  if(h===ADMIN_HASH){$('loginScreen').style.display='none';$('app').style.display='block';loadBookings();}
  else{$('loginErr').style.display='block';$('passInput').value='';}
}

async function loadBookings(){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/bookings?order=date.desc',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await res.json();
    bookings=Array.isArray(data)?data:[];
  }catch(e){bookings=[];showToast('Could not connect to database.',4000);}
  renderAll();
}

async function saveToSupabase(data,id){
  if(!SUPABASE_URL)return null;
  var url=id?(SUPABASE_URL+'/rest/v1/bookings?id=eq.'+id):(SUPABASE_URL+'/rest/v1/bookings');
  var method=id?'PATCH':'POST';
  var headers={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'};
  try{var res=await fetch(url,{method:method,headers:headers,body:JSON.stringify(data)});var d=await res.json();return Array.isArray(d)?d[0]:d;}catch(e){return null;}
}

  $('statUpcoming').textContent=up;$('statDone').textContent=done;$('statRem').textContent=rem;

function renderCalendar(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  $('calTitle').textContent=MONTHS[m]+' '+y;
  const firstDay=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  const byDay={};
  bookings.forEach(b=>{const d=new Date(b.date);if(d.getFullYear()===y&&d.getMonth()===m){const dd=d.getDate();byDay[dd]=byDay[dd]||[];byDay[dd].push(b);}});
  $('calDayLabels').innerHTML=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getDate()===d&&today.getMonth()===m&&today.getFullYear()===y;
    const events=byDay[d]||[];
    var cellClick=events.length>0?'openDayModal('+d+')':'';
    var cellCursor=events.length>0?'pointer':'default';
    html+='<div class="cal-cell'+(isToday?' today':'')+'" style="cursor:'+cellCursor+'" '+(cellClick?'onclick="'+cellClick+'"':'')+'>'+
          '<div class="cal-num">'+d+'</div>'+

  let jhtml=`<div style="font-size:10px;color:var(--text-light);margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700">Jobs This Month</div>`;
  jobsList.sort((a,b)=>+a[0]-+b[0]).forEach(([day,list])=>{list.forEach(b=>{

async function saveJob(){
  const name=$('mName').value.trim(),phone=$('mPhone').value.trim(),email=$('mEmail').value.trim(),date=$('mDate').value,time=$('mTime').value,pickup=$('mPickup').value.trim(),dropoff=$('mDropoff').value.trim();
  if(!name||!phone||!email||!date||!time||!pickup||!dropoff){showToast('Please fill in all required fields.');return;}
  const data={name,phone,email,date,start_time:time,pickup_address:pickup,dropoff_address:dropoff,notes:$('mNotes').value.trim(),status:$('mStatus').value};
  const editId=$('editId').value;
  try{
    if(editId){bookings=bookings.map(b=>String(b.id)===String(editId)?{...b,...data}:b);await saveToSupabase(data,editId);showToast('Booking updated ✓');}
    else{
      var newB={...data,id:Date.now(),signature_name:'(admin added)',signed_date:new Date().toISOString().split('T')[0],reminder_sent:false,created_at:new Date().toISOString()};
      if(SUPABASE_URL){const saved=await saveToSupabase(newB,null);if(saved&&saved.id)newB=saved;}
      bookings=[newB,...bookings];

  closeModal();renderAll();

function calcJob(){
  var start=document.getElementById('cStart').value;
  var finish=document.getElementById('cFinish').value;
  var rate=parseFloat(document.getElementById('cRate').value)||150;
  var callout=parseFloat(document.getElementById('cCallout').value)||0;
  var extras=parseFloat(document.getElementById('cExtras').value)||0;
  var clientName=document.getElementById('cClientName').value.trim();
  var gst=document.getElementById('cGST').checked;
  if(!start||!finish){alert('Please enter both start and finish times.');return;}
  var sp=start.split(':'),fp=finish.split(':');
  var sh=parseInt(sp[0]),sm=parseInt(sp[1]),fh=parseInt(fp[0]),fm=parseInt(fp[1]);
  var sM=sh*60+sm,fM=fh*60+fm;
  if(fM<sM)fM+=1440;
  var totalMins=fM-sM,hours=totalMins/60;
  var labour=hours*rate,subtotal=labour+callout+extras;
  var gstAmt=gst?subtotal*0.1:0,total=subtotal+gstAmt;
  var hrs=Math.floor(totalMins/60),mins=totalMins%60;
  var durStr=hrs>0?(mins>0?hrs+'h '+mins+'min':hrs+'h'):mins+'min';
  function fmtT(h,m){return (h>12?h-12:(h||12))+':'+('0'+m).slice(-2)+' '+(h>=12?'PM':'AM');}
  document.getElementById('calcDuration').textContent='Duration: '+durStr;
  var rows='';
  rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">Hours</span><span style="font-size:13px;font-weight:600;color:#e8f0e8">'+hours.toFixed(2)+'h</span></div>';
  rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">Labour ($'+rate+'/hr)</span><span style="font-size:13px;font-weight:600;color:#e8f0e8">$'+labour.toFixed(2)+'</span></div>';
  if(callout>0)rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">Call Out Fee</span><span style="font-size:13px;font-weight:600;color:#e8f0e8">$'+callout.toFixed(2)+'</span></div>';
  if(extras>0)rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">Additional</span><span style="font-size:13px;font-weight:600;color:#e8f0e8">$'+extras.toFixed(2)+'</span></div>';
  rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">Subtotal</span><span style="font-size:13px;font-weight:600;color:#e8f0e8">$'+subtotal.toFixed(2)+'</span></div>';
  if(gst)rows+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #2a3a2a"><span style="font-size:12px;color:#9aaa9a">GST (10%)</span><span style="font-size:13px;font-weight:600;color:#6ec86e">$'+gstAmt.toFixed(2)+'</span></div>';
  document.getElementById('calcRows').innerHTML=rows;
  document.getElementById('calcTotal').textContent='$'+total.toFixed(2);
  document.getElementById('calcGSTNote').textContent=gst?'GST included: $'+gstAmt.toFixed(2):'GST not included';
  var today=new Date().toLocaleDateString('en-AU');
  var msg='Hi'+(clientName?' '+clientName.split(' ')[0]:'')+'! \n\nInvoice from Deus Labour Hire:\n\n';
  msg+='Date: '+today+'\nStart: '+fmtT(sh,sm)+'\nFinish: '+fmtT(fh,fm)+'\nDuration: '+durStr+'\n\n';
  msg+='Labour ('+hours.toFixed(2)+'h x $'+rate+'): $'+labour.toFixed(2)+'\n';
  if(callout>0)msg+='Call Out Fee: $'+callout.toFixed(2)+'\n';
  if(extras>0)msg+='Additional: $'+extras.toFixed(2)+'\n';
  msg+='Subtotal: $'+subtotal.toFixed(2)+'\n';
  if(gst)msg+='GST (10%): $'+gstAmt.toFixed(2)+'\n';
  msg+='\nTOTAL: $'+total.toFixed(2)+(gst?' (inc. GST)':'')+'\n\nPayment due upon completion.\nThank you for choosing Deus Labour Hire!';
  document.getElementById('calcMsg').textContent=msg;
  document.getElementById('calcResult').style.display='block';
  document.getElementById('calcResult').scrollIntoView({behavior:'smooth'});
}
